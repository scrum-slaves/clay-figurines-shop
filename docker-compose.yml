version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: clay-shop-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    container_name: clay-shop-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && python manage.py migrate
      && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: clay-shop-frontend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "npm install
      && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
