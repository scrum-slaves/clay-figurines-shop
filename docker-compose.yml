services:
  db:
    image: postgres:16-alpine
    container_name: clay-shop-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dump.sql:/docker-entrypoint-initdb.d/001-dump.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-tests:
    build:
      context: ./backend
    container_name: clay-shop-backend-tests
    working_dir: /app
    env_file:
      - .env
    command: python manage.py test

  backend:
    build:
      context: ./backend
    container_name: clay-shop-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    command: >
      sh -c "until pg_isready -h $$POSTGRES_HOST -p $$POSTGRES_PORT -U $$POSTGRES_USER; do
      echo 'Waiting for postgres...';
      sleep 2;
      done
      && python manage.py migrate
      && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      backend-tests:
        condition: service_completed_successfully

  frontend-tests:
    build:
      context: ./frontend
    container_name: clay-shop-frontend-tests
    working_dir: /app
    environment:
      NODE_ENV: development
    command: sh -c "npm ci --include=dev && find node_modules/.bin -type f -exec sed -i 's/\r$//' {} + && npm run test:e2e"

  frontend:
    build:
      context: ./frontend
    container_name: clay-shop-frontend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_MASTER_USERNAME: ${VITE_MASTER_USERNAME}
    command: sh -c "npm ci --include=dev && find node_modules/.bin -type f -exec sed -i 's/\r$//' {} + && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  frontend_node_modules:
