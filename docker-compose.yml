services:
  db:
    image: postgres:16-alpine
    container_name: clay-shop-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    container_name: clay-shop-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && python manage.py migrate
      && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: clay-shop-frontend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    # temporary stub: keep frontend container silent while frontend development is separate
    command: sh -c "tail -f /dev/null"
    # do not mount frontend code to avoid noisy npm logs
    ports: []
    volumes: []
    depends_on:
      - backend

volumes:
  postgres_data:
